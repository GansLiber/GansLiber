name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg?palette=github-dark&color_snake=deepskyblue&color_dots=%23161b22,%230E4429,%2300664D,%2300ADD8,%2369D6FF

            dist/github-snake-dark.svg?palette=github-dark&color_snake=deepskyblue&color_dots=%23161b22,%230E4429,%2300664D,%2300ADD8,%2369D6FF

            dist/github-snake.gif?color_snake=deepskyblue&color_dots=%23161b22,%230E4429,%2300664D,%2300ADD8,%2369D6FF&color_background=%230D1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
