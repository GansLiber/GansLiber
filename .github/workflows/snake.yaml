name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}

          outputs: |
            dist/github-snake.svg?palette=github-light&color_snake=%2300ADD8&color_dots=%23161B22,%23003B49,%23007D9C,%2300ADD8,%237FDFFF

            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2300ADD8&color_dots=%23161B22,%23003B49,%23007D9C,%2300ADD8,%237FDFFF

            dist/github-snake.gif?color_snake=%2300ADD8&color_dots=%23161B22,%23003B49,%23007D9C,%2300ADD8,%237FDFFF&color_background=%230D1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
