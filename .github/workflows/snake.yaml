name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *" # каждый день
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake files
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

            dist/github-snake-blue.svg?color_snake=#58a6ff&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

            dist/github-snake-purple.svg?color_snake=#a371f7&color_dots=#0d1117,#2d1b69,#5a32a3,#7c4dff,#b388ff

            dist/github-snake.gif?color_snake=#58a6ff&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e,#216e39

            dist/ocean.gif?color_snake=#00d4ff&color_dots=#0d1117,#1f6feb,#2f81f7,#58a6ff,#79c0ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
